x-app-image: &app-image
  build:
    context: ..
    dockerfile: infra/Dockerfile
    target: dev
  image: collecta-dev:latest

x-app-volumes: &app-volumes
  - ../apps/api:/app/apps/api
  - /app/apps/api/node_modules
  - ../apps/web:/app/apps/web
  - /app/apps/web/node_modules
  - ../packages:/app/packages
  - /app/packages/db/node_modules
  - /app/packages/shared/node_modules
  - ../package.json:/app/package.json:ro
  - ../bun.lock:/app/bun.lock:ro
  - ../tsconfig.json:/app/tsconfig.json:ro
  - ../.env:/app/.env:ro

services:
  web:
    <<: *app-image
    container_name: collecta-web
    working_dir: /app/apps/web

    command: bun run dev

    volumes: *app-volumes

    ports:
      - "3000:3000"

    environment:
      NEXT_TELEMETRY_DISABLED: "1"
      NEXT_PUBLIC_SHOW_DEMO_ACCOUNTS: ${NEXT_PUBLIC_SHOW_DEMO_ACCOUNTS:-false}
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-/api/v1}
      JWT_SECRET: ${JWT_SECRET}

    healthcheck:
      test:
        [
          "CMD",
          "bun",
          "-e",
          "const r = await fetch('http://localhost:3000'); if (!r.ok) process.exit(1)"
        ]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 20s

  api:
    <<: *app-image
    container_name: collecta-api
    working_dir: /app/apps/api

    command: bun run dev

    volumes: *app-volumes

    ports:
      - "4000:4000"

    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: ${PORT:-4000}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-8h}
      AUTH_MAX_FAILED_LOGIN_ATTEMPTS: ${AUTH_MAX_FAILED_LOGIN_ATTEMPTS:-5}
      AUTH_LOCK_DURATION_SECONDS: ${AUTH_LOCK_DURATION_SECONDS:-900}
      POSTGRES_USER: ${POSTGRES_USER:-collecta}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-collecta}
      POSTGRES_DB: ${POSTGRES_DB:-collecta}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}

    healthcheck:
      test:
        [
          "CMD",
          "bun",
          "-e",
          "const r = await fetch('http://localhost:4000/api/v1/health'); if (!r.ok) process.exit(1)"
        ]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s

  postgres:
    image: postgres:17-alpine
    container_name: collecta-postgres

    environment:
      POSTGRES_USER: ${POSTGRES_USER:-collecta}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-collecta}
      POSTGRES_DB: ${POSTGRES_DB:-collecta}

    ports:
      - "5432:5432"

    volumes:
      - collecta_postgres:/var/lib/postgresql/data

  caddy:
    image: caddy:2-alpine
    container_name: collecta-caddy

    depends_on:
      - web
      - api

    ports:
      - "80:80"

    volumes:
      - "./caddy/Caddyfile:/etc/caddy/Caddyfile:ro"

    restart: unless-stopped

volumes:
  collecta_postgres: {}
